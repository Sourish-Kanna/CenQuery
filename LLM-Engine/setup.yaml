#cloud-config
package_update: true
package_upgrade: true

# 1. Ensure dependencies are present
# Note: Use the 'NVIDIA GPU Optimized' image to have drivers pre-installed
packages:
  - git
  - docker.io

runcmd:
  # 2. Setup Project
  - cd /root
  - [ git, clone, "-b", "stable", "https://github.com/Sourish-Kanna/CenQuery.git" ]
  - cd /root/CenQuery/LLM-Engine

  # 3. Cleanup existing containers (if any)
  - docker stop cenquery-engine || true
  - docker rm cenquery-engine || true

  # 4. Build the image
  # This may take several minutes depending on the model size
  - docker build -t cenquery-api .

  # 5. Run the Engine
  - |
    docker run -d \
      --gpus all \
      --restart always \
      --name cenquery-engine \
      -e PYTORCH_CUDA_ALLOC_CONF="expandable_segments:True" \
      -p 8001:8000 \
      -v /root/CenQuery/LLM-Engine/model_cache:/app/model_cache \
      cenquery-api

final_message: "The CenQuery Engine deployment is complete and running on port 8001."